<div class="webhook_api_mapping_div" data_curr_api_index="2">
  <div class="card-header"><span class="gbl_module_index">2</span> SMTP (Pabbly) : Send Email</div>
  <div class="card-body">
    <div class="form-group form-group-choose_app_method">
      <label>Action Event</label>
      <div class="choose_app_ele_con">
        <select class="choose_app_method" name="api_method"><option selected>Send Email</option></select>
      </div>
    </div>

    <div class="form-group api_mapping_con">
      <div class="api_mapping_curr_params_con">
        <label class="map_data_label">From Name</label>
        <input class="map_data_key" value="from_name">
        <textarea class="map_data_value">EdPulse</textarea>
      </div>
      <div class="api_mapping_curr_params_con">
        <label class="map_data_label">From Email</label>
        <input class="map_data_key" value="from_email">
        <textarea class="map_data_value">application@edpulse.com</textarea>
      </div>
      <div class="api_mapping_curr_params_con">
        <label class="map_data_label">To Email</label>
        <input class="map_data_key" value="to">
        <textarea class="map_data_value">1. From 0 Address : student@example.com</textarea>
      </div>
      <div class="api_mapping_curr_params_con">
        <label class="map_data_label">Subject</label>
        <input class="map_data_key" value="subject">
        <textarea class="map_data_value">Welcome to EdPulse</textarea>
      </div>
    </div>

    <div class="form-group api_response_con">
      <label>Response Received</label>
      <textarea class="map_data_value">{"status":"sent","id":"abc123"}</textarea>
    </div>
  </div>
</div>
